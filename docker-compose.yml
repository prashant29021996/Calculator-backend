version: "3.9"
services:
  backend:
    build: .
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      GIN_MODE: release
      LOG_LEVEL: info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend
