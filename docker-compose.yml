version: "3.9"
services:
  backend:
    build: .
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      GIN_MODE: release
      LOG_LEVEL: info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend
