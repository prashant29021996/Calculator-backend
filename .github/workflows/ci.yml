name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Download modules
        run: go mod download
      - name: Format check
        run: gofmt -w $(find . -name '*.go') && git diff --exit-code
      - name: Lint
        run: |
          GOBIN="$(go env GOPATH)/bin"
          if [ ! -x "$GOBIN/golangci-lint" ]; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$GOBIN" v1.64.8
          fi
          "$GOBIN/golangci-lint" run
      - name: Test
        run: |
          go test ./... -coverprofile=coverage.out
          total=$(go tool cover -func=coverage.out | tail -n 1 | awk '{print $3}' | sed 's/%//')
          echo "COVERAGE_PERCENT=$total" >> "$GITHUB_ENV"
          mkdir -p public
          cat > public/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=https://img.shields.io/badge/coverage-${total}%25-brightgreen" />
              <title>Coverage Badge</title>
            </head>
            <body>
              <p>Redirecting to coverage badge...</p>
            </body>
          </html>
          EOF
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            public/index.html
  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: ./public
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
