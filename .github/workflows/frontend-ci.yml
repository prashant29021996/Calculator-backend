name: Frontend CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend with coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare frontend artifacts
        run: |
          mkdir -p public/frontend
          cp -r frontend/coverage public/frontend/coverage
          cp -r frontend/dist public/frontend/dist

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-quality-artifacts
          path: |
            public/frontend/coverage
            public/frontend/dist
